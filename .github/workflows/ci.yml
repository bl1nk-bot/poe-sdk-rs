# Integrated CI/CD & Auto Pull Request Pipeline
name: CI

on:
  push:
    branches: [ main, develop ]
    # Also trigger on feature branches for early validation
    branches-ignore: []
  pull_request:
    branches: [ main, develop ]

# Global permissions - Least Privilege
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Verify commit message format
  commit-lint:
    name: Lint Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check commit message format
        run: |
          # Pattern enforcing type(Phase N): Title (Total length ~50 chars)
          PATTERN="^(feat|fix|ci|docs|style|refactor|test|chore)\(Phase [0-9]+\): .{1,35}$"
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            commits=$(git log --format=%s origin/${{ github.base_ref }}..HEAD)
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            commits=$(git log --format=%s ${{ github.event.before }}..${{ github.sha }})
          else
            commits=$(git log -1 --format=%s)
          fi
          
          echo "Checking commits:"
          echo "$commits"
          
          error=0
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            if [[ ! $line =~ $PATTERN ]]; then
              echo "❌ Invalid format: $line"
              echo "   Required format: type(Phase N): title (max 50 chars total)"
              error=1
            else
              echo "✅ Valid format: $line"
            fi
          done <<< "$commits"
          
          if [ $error -eq 1 ]; then
            exit 1
          fi

  # 2. Primary CI job - comprehensive testing
  test:
    name: Test Suite
    needs: commit-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [ stable, beta ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Run doc tests
        run: cargo test --doc

      - name: Generate documentation
        run: cargo doc --no-deps --document-private-items

  # Test examples separately for better visibility
  examples:
    name: Test Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Test basic example
        run: cargo run --example basic
      - name: Test advanced example
        run: cargo run --example advanced

  # Test snapshot updates (only on main branch)
  snapshots:
    name: Update Snapshots
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Test and update snapshots
        run: cargo test --test error_snapshots
        env:
          INSTA_UPDATE: 1

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Run audit
        uses: actions-rust-lang/audit@v1

  # 3. Auto Pull Request (Only for feature branches on push)
  auto-pr:
    name: Create Pull Request
    needs: [test, audit]
    runs-on: ubuntu-latest
    # Specific permissions for PR creation
    permissions:
      contents: write
      pull-requests: write
      issues: write
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          # Check if PR already exists
          existing_pr=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR already exists (#$existing_pr), skipping creation."
            exit 0
          fi

          # Triage: Link to Phase issues
          ISSUES_JSON=$(gh issue list --repo ${{ github.repository }} --state open --json number,title --limit 30)
          PHASE_NUM=$(echo "$BRANCH_NAME" | grep -oE '[0-9]+' | head -n 1)
          
          PR_TITLE="${BRANCH_NAME}: Auto PR"
          PR_BODY="Automated PR after passing all CI gates."

          if [ -n "$PHASE_NUM" ]; then
            MATCHED_ISSUE=$(echo "$ISSUES_JSON" | jq -c --arg num "$PHASE_NUM" '.[] | select(.title | test("Phase " + $num))' | head -n 1)
            if [ -n "$MATCHED_ISSUE" ] && [ "$MATCHED_ISSUE" != "null" ]; then
              ISSUE_NO=$(echo "$MATCHED_ISSUE" | jq -r '.number')
              ISSUE_TITLE=$(echo "$MATCHED_ISSUE" | jq -r '.title')
              PR_TITLE="feat(v2): implement $ISSUE_TITLE (Auto PR)"
              PR_BODY="Resolves #$ISSUE_NO\n\n_Auto-generated after CI validation._"
            fi
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME" \
            --label "auto-pr"

  # 4. Auto release and notification (Main branch only)
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [test, audit]
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Get Version
        id: get_version
        run: echo "version=$(grep -m1 '^version = ' Cargo.toml | cut -d '\"' -f2)" >> $GITHUB_OUTPUT
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          if ! git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            gh release create "v${{ steps.get_version.outputs.version }}" --generate-notes
          fi
