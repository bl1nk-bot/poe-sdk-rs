name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
        with:
          # Fail if a dependency has a high severity vulnerability or worse
          fail-on-severity: high
          # Block PRs that introduce new dependencies with risky licenses (optional but recommended)
          # allow-licenses: MIT, Apache-2.0, BSD-3-Clause
