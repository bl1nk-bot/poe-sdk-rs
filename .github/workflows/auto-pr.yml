name: Auto Pull Request

on:
  push:
    branches-ignore:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-and-pr:
    name: Validate and Create PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (fmt)
        run: cargo fmt --all -- --check

      - name: Run clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Security Audit (audit)
        uses: actions-rust-lang/audit@v1

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # ตรวจสอบว่ามี PR จาก branch นี้ไปยัง upstream แล้วหรือยังเพื่อป้องกันการเปิด PR ซ้ำ
          PR_EXISTS=$(gh pr list --repo bl1nk-bot/bl1z --head "$REPO_OWNER:$REF_NAME" --json number --jq 'length')
          echo "exists=$PR_EXISTS" >> $GITHUB_OUTPUT

      - name: Create Pull Request to Upstream
        if: steps.check_pr.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # ตั้งค่าพื้นฐานเบื้องต้น
          BRANCH_NAME="$REF_NAME"
          PR_TITLE="${BRANCH_NAME}: Auto PR from Fork"
          PR_BODY="This PR was automatically created by GitHub Actions after passing formatting, cargo clippy, unit/integration tests, and security audits."
          LABELS="auto-pr"
          
          if [[ "$BRANCH_NAME" =~ ^(feat|feature)/ ]]; then
            LABELS="enhancement"
          elif [[ "$BRANCH_NAME" =~ ^(fix|bug)/ ]]; then
            LABELS="bug"
          elif [[ "$BRANCH_NAME" =~ ^docs/ ]]; then
            LABELS="documentation"
          fi
          
          # ดึง Open Issues ทั้งหมดจาก Upstream เพื่อจับคู่ข้อมูลอย่างสร้างสรรค์
          ISSUES_JSON=$(gh issue list --repo bl1nk-bot/bl1z --state open --json number,title,labels --limit 30)
          
          # วิเคราะห์หาตัวเลข Phase จากชื่อ Branch (เช่น '9' หรือ '8')
          PHASE_NUM=$(echo "$BRANCH_NAME" | grep -oE '[0-9]+' | head -n 1)
          
          if [ -n "$PHASE_NUM" ]; then
            # ค้นหา Issue ที่ระบุถึง Phase นั้น ๆ
            MATCHED_ISSUE=$(echo "$ISSUES_JSON" | jq -c --arg num "$PHASE_NUM" '.[] | select(.title | test("Phase " + $num))' | head -n 1)
            
            if [ -n "$MATCHED_ISSUE" ] && [ "$MATCHED_ISSUE" != "null" ]; then
              ISSUE_NO=$(echo "$MATCHED_ISSUE" | jq -r '.number')
              ISSUE_TITLE=$(echo "$MATCHED_ISSUE" | jq -r '.title')
              
              PR_TITLE="feat(v2): implement $ISSUE_TITLE (Auto PR)"
              PR_BODY="This PR implements/fixes features related to **$ISSUE_TITLE** (Issue #$ISSUE_NO).\n\n### 🔗 Related Issues\n- Resolves #$ISSUE_NO\n\n_Auto-generated after successfully passing formatting checks, clippy lints, unit/integration tests, and security audits._"
              
              # ดึงป้ายกำกับของ Issue นั้นมาเป็นส่วนหนึ่งของ PR ด้วย
              ISSUE_LABELS=$(echo "$MATCHED_ISSUE" | jq -r '.labels[].name' | tr '\n' ',' | sed 's/,$//')
              if [ -n "$ISSUE_LABELS" ]; then
                LABELS="$LABELS,$ISSUE_LABELS"
              fi
            fi
          fi
          
          # ทำความสะอาดและสลับคำซ้ำใน Labels
          LABELS=$(echo "$LABELS" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Selected labels: $LABELS"

          # ส่ง PR ไปยัง upstream repository
          gh pr create \
            --repo bl1nk-bot/bl1z \
            --head "$REPO_OWNER:$REF_NAME" \
            --base main \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --label "$LABELS"

      - name: Send Webhook Notification
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TARGET_URL="${WEBHOOK_URL:-$DISCORD_WEBHOOK}"
          if [ -n "$TARGET_URL" ]; then
            MESSAGE="📢 **Auto PR Created Successfully!**\nBranch: \`$REF_NAME\`\n📝 โปรดตรวจสอบคอมม้นใน Pull Request เพื่อดำเนินการรีวิวต่อไป"
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"content\": \"$MESSAGE\"}" \
              "$TARGET_URL"
          else
            echo "No Webhook secret found, skipping notification."
          fi
