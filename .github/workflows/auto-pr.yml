name: Auto Pull Request

on:
  push:
    branches-ignore:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-and-pr:
    name: Validate and Create PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (fmt)
        run: cargo fmt --all -- --check

      - name: Run clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Security Audit (audit)
        uses: actions-rust-lang/audit@v1

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ตรวจสอบว่ามี PR จาก branch นี้ไปยัง upstream แล้วหรือยังเพื่อป้องกันการเปิด PR ซ้ำ
          PR_EXISTS=$(gh pr list --repo bl1nk-bot/bl1z --head "${{ github.repository_owner }}:${{ github.ref_name }}" --json number --jq 'length')
          echo "exists=$PR_EXISTS" >> $GITHUB_OUTPUT

      - name: Create Pull Request to Upstream
        if: steps.check_pr.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # วิเคราะห์และเลือก Label ให้สอดคล้องกับประเภทของ Branch
          BRANCH_NAME="${{ github.ref_name }}"
          LABEL="auto-pr"
          
          if [[ "$BRANCH_NAME" =~ ^(feat|feature)/ ]]; then
            LABEL="enhancement"
          elif [[ "$BRANCH_NAME" =~ ^(fix|bug)/ ]]; then
            LABEL="bug"
          elif [[ "$BRANCH_NAME" =~ ^docs/ ]]; then
            LABEL="documentation"
          fi
          
          echo "Selected label: $LABEL"

          # ส่ง PR ไปยัง upstream repository พร้อมติด label
          gh pr create \
            --repo bl1nk-bot/bl1z \
            --head "${{ github.repository_owner }}:${{ github.ref_name }}" \
            --base main \
            --title "${{ github.ref_name }}: Auto PR from Fork" \
            --body "This PR was automatically created by GitHub Actions after passing fmt, test, and security audit." \
            --label "$LABEL"

