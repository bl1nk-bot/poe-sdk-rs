updates:
- assignees:
  - billlzzz26
  commit-message:
    include: scope
    prefix: deps
  directory: /
  groups:
    rust-dependencies:
      patterns:
      - "*"
  labels:
  - dependencies
  - rust
  open-pull-requests-limit: 10
  package-ecosystem: cargo
  reviewers:
  - billlzzz26
  schedule:
    day: monday
    interval: weekly
    time: "09:00"
- assignees:
  - billlzzz26
  commit-message:
    include: scope
    prefix: ci
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - github-actions
  - ci
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  reviewers:
  - billlzzz26
  schedule:
    day: monday
    interval: weekly
    time: "09:00"
version: 2
